<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact – ZaneEnterprise LLC</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

  <canvas id="aurora"></canvas>
  <canvas id="stars"></canvas>

  <main>
    <h1>Let’s Build Something Together</h1>
    <div class="card">
      <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        <input type="hidden" name="access_key" value="5e473c65-d194-41d6-9e6e-36b98694c848" />
        <input type="hidden" name="subject" value="New Contact from ZaneEnterprise Website" />
        <input type="checkbox" name="botcheck" style="display: none;" />
        <input type="hidden" name="redirect" value="https://zaneenterprise.net/success.html">
        
        <div class="form-group">
          <label for="name" class="form-label">Name</label>
          <input 
            type="text" 
            name="name" 
            id="name" 
            placeholder="Your name" 
            required 
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input 
            type="email" 
            name="email" 
            id="email" 
            placeholder="your@email.com" 
            required 
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="message" class="form-label">Message</label>
          <textarea 
            name="message" 
            id="message" 
            placeholder="Tell me about your project..." 
            required 
            class="form-input form-textarea"
            rows="4"
          ></textarea>
        </div>

        <button type="submit" class="form-button">Send Message</button>
        <div id="result" class="form-result"></div>
      </form>
      
      <div class="contact-alt">
        <p>Or email me directly at:<br>
           <a href="mailto:christian@zaneenterprise.net">christian@zaneenterprise.net</a></p>
        <p class="phone-contact">Call me at:<br>
           <a href="tel:8777309263">877-730-ZANE<span class="phone-digits">(9263)</span></a></p>
      </div>
    </div>

    <a class="home-link" href="index.html">← Back to Home</a>
  </main>

  <script src="script.js"></script>
  <footer class="common-footer">
    ©&nbsp;<span id="year"></span>&nbsp;ZaneEnterprise LLC. All rights reserved.
  </footer>
  </body>
</html>
