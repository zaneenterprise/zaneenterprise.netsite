<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZaneEnterprise LLC</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#000;
      --fg:#f5f5f7;
      --accent:#13b0f2;
      --x:50vw;
      --y:50vh;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      color:var(--fg);
      height:100vh;
      overflow:hidden;
      background:
        radial-gradient(
          600px circle at var(--x) var(--y),
          rgba(19,176,242,0.25) 0%,
          rgba(0,0,0,0) 70%
        ), var(--bg);
    }

    #stars{
      position:fixed;inset:0;z-index:-2;
      background:#000;
    }

    header,footer{text-align:center;position:relative;z-index:1}
    header{
      height:100vh;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:3rem 1.5rem;
      position:relative;
    }
    header img{
      width:clamp(260px,40vw,680px);
      height:auto;
      margin-bottom:2.5rem;
      filter:drop-shadow(0 0 25px var(--accent));
      transition:transform .25s ease-out;
      will-change:transform;
      animation:pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow{
      0%,100%{filter:drop-shadow(0 0 25px var(--accent))}
      50%{filter:drop-shadow(0 0 45px var(--accent)) brightness(1.1)}
    }
    h1{
      font-size:clamp(2.8rem,6vw,3.8rem);
      font-weight:600;
      letter-spacing:.03em;
      animation:float-in 1s ease-out;
    }
    @keyframes float-in{
      from{opacity:0;transform:translateY(30px)}
      to{opacity:1;transform:translateY(0)}
    }
    .subline{
      margin-top:.8rem;
      font-size:1rem;
      opacity:.85;
      animation:float-in 1.5s ease-out;
    }
    .button{
      animation:float-in 2s ease-out;
    }
    .tagline{
      margin-top:1.1rem;
      font-size:1.3rem;
      font-weight:600;
      color:var(--accent);
      overflow:hidden;
      white-space:nowrap;
      width:0;
      animation:typing 2s steps(30) .5s forwards;
    }
    @keyframes typing{
      to{width:100%}
    }
    .subline a{color:var(--fg);text-decoration:underline}
    .button{
      display:inline-block;
      margin-top:2rem;
      margin-bottom:3rem;
      padding:1rem 2.6rem;
      border:2px solid transparent;
      border-radius:999px;
      color:var(--fg);
      text-decoration:none;
      font-weight:600;
      position:relative;
      background:linear-gradient(var(--bg),var(--bg)) padding-box,
                linear-gradient(45deg,#13b0f2,#0099ff,#13b0f2) border-box;
      background-size:200% 200%;
      animation:gradient-shift 3s ease infinite;
      transition:all .3s ease;
    }
    .button:hover{
      transform:translateY(-3px) scale(1.05);
      box-shadow:0 10px 40px rgba(19,176,242,0.4);
      filter:brightness(1.2);
    }
    @keyframes gradient-shift{
      0%,100%{background-position:0% 50%}
      50%{background-position:100% 50%}
    }
    footer{
      position:absolute;
      bottom:0.5rem;
      left:0;
      right:0;
      font-size:.85rem;
      opacity:.65;
    }
    @keyframes fade-in{
      to{opacity:1}
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <header>
    <img id="logo" src="Z.svg" alt="ZaneEnterprise logo" />
    <h1>ZaneEnterprise LLC</h1>
    <p class="tagline">App &amp; Website Development</p>
    <p class="subline">
      Need a site or app that actually rocks?
      <a href="contact.html">Contact me.</a>&nbsp;&nbsp;I’ll build it and make it good.
    </p>
    <a class="button" href="contact.html">Reach&nbsp;Out</a>
    
    <footer>
      © <span id="year"></span> ZaneEnterprise LLC. All rights reserved.
    </footer>
  </header>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const root  = document.documentElement;
    const logo  = document.getElementById('logo');
    let winW, winH;
    const measure = () => { winW = window.innerWidth; winH = window.innerHeight; };
    measure(); window.addEventListener('resize', measure);

    window.addEventListener('pointermove', e=>{
      const x = e.clientX, y = e.clientY;
      root.style.setProperty('--x', x + 'px');
      root.style.setProperty('--y', y + 'px');
      const dx = (x - winW/2) / (winW/2);
      const dy = (y - winH/2) / (winH/2);
      logo.style.transform = `rotateX(${dy*6}deg) rotateY(${-dx*6}deg)`;
    });

    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const STAR_COUNT = 120;
    const stars = [];
    const shootingStars = [];
    
    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for(let i=0;i<STAR_COUNT;i++){
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        z: Math.random()*0.5 + 0.2,
        r: Math.random()*1.2 + 0.4,
        opacity: Math.random()*0.5 + 0.5
      });
    }
    
    function createShootingStar(){
      if(Math.random() < 0.02 && shootingStars.length < 3){
        shootingStars.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height*0.5,
          vx: (Math.random() - 0.5) * 10,
          vy: Math.random() * 5 + 2,
          length: Math.random() * 80 + 40,
          opacity: 1
        });
      }
    }
    
    function updateStars(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      
      stars.forEach(s=>{
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        s.opacity += (Math.random() - 0.5) * 0.05;
        s.opacity = Math.max(0.3, Math.min(1, s.opacity));
        s.y += s.z;
        if(s.y > canvas.height) s.y = -10;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      });
      
      createShootingStar();
      shootingStars.forEach((s, i)=>{
        if(s.opacity <= 0){
          shootingStars.splice(i, 1);
          return;
        }
        
        const gradient = ctx.createLinearGradient(s.x, s.y, s.x-s.vx*10, s.y-s.vy*10);
        gradient.addColorStop(0, `rgba(255,255,255,${s.opacity})`);
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx * s.length/10, s.y - s.vy * s.length/10);
        ctx.stroke();
        
        s.x += s.vx;
        s.y += s.vy;
        s.opacity -= 0.02;
      });
      
      requestAnimationFrame(updateStars);
    }
    updateStars();
  </script>
</body>
</html>
