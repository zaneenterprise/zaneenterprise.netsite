<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZaneEnterprise LLC</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#000;
      --fg:#f5f5f7;
      --accent:#13b0f2;
      --x:50vw;      /* cursor fallback */
      --y:50vh;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      color:var(--fg);
      min-height:100vh;
      overflow-x:hidden;
      /* mouse‑responsive glow */
      background:
        radial-gradient(
          600px circle at var(--x) var(--y),
          rgba(19,176,242,0.25) 0%,
          rgba(0,0,0,0) 70%
        ), var(--bg);
    }

    /* starfield canvas */
    #stars{
      position:fixed;inset:0;z-index:-2;
      background:#000; /* fallback */
    }

    header,footer{text-align:center;position:relative;z-index:1}
    header{
      height:100vh;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:3rem 1.5rem;
      position:relative;
    }
    header img{
      width:clamp(260px,40vw,680px);
      height:auto;
      margin-bottom:2.5rem;
      filter:drop-shadow(0 0 25px var(--accent));
      transition:transform .25s ease-out;
      will-change:transform;
    }
    h1{font-size:clamp(2.8rem,6vw,3.8rem);font-weight:600;letter-spacing:.03em}
    .tagline{margin-top:1.1rem;font-size:1.3rem;font-weight:600;color:var(--accent)}
    .subline{margin-top:.8rem;font-size:1rem;opacity:.85}
    .subline a{color:var(--fg);text-decoration:underline}
    .button{
      display:inline-block;
      margin-top:3rem;
      padding:1rem 2.6rem;
      border:2px solid var(--accent);
      border-radius:999px;
      color:var(--fg);
      text-decoration:none;
      font-weight:600;
      transition:background .2s,color .2s,transform .2s;
    }
    .button:hover{background:var(--accent);color:var(--bg);transform:translateY(-2px)}
    footer{padding:1rem 0;font-size:.85rem;opacity:.65}
  </style>
</head>
<body>

  <!-- drifting starfield -->
  <canvas id="stars"></canvas>

  <header>
    <img id="logo" src="Z.svg" alt="ZaneEnterprise logo" />
    <h1>ZaneEnterprise LLC</h1>
    <p class="tagline">App &amp; Website Development</p>
    <p class="subline">
      Need a site or app that actually rocks?
      <a href="contact.html">Contact me.</a>&nbsp;&nbsp;I’ll build it and make it good.
    </p>
    <a class="button" href="contact.html">Reach&nbsp;Out</a>
  </header>

  <footer>
    © <span id="year"></span> ZaneEnterprise LLC. All rights reserved.
  </footer>

  <script>
    // ==== Year ====
    document.getElementById('year').textContent = new Date().getFullYear();

    // ==== Mouse‑responsive glow & logo parallax ====
    const root  = document.documentElement;
    const logo  = document.getElementById('logo');
    let winW, winH;
    const measure = () => { winW = window.innerWidth; winH = window.innerHeight; };
    measure(); window.addEventListener('resize', measure);

    window.addEventListener('pointermove', e=>{
      const x = e.clientX, y = e.clientY;
      root.style.setProperty('--x', x + 'px');
      root.style.setProperty('--y', y + 'px');
      // logo slight tilt
      const dx = (x - winW/2) / (winW/2);
      const dy = (y - winH/2) / (winH/2);
      logo.style.transform = `rotateX(${dy*6}deg) rotateY(${-dx*6}deg)`;
    });

    // ==== Star‑field ====
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const STAR_COUNT = 120;
    const stars = [];
    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for(let i=0;i<STAR_COUNT;i++){
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        z: Math.random()*0.5 + 0.2,  // speed factor
        r: Math.random()*1.2 + 0.4
      });
    }
    function updateStars(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#fff';
      stars.forEach(s=>{
        s.y += s.z; // drift down
        if(s.y > canvas.height) s.y = -10;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      });
      requestAnimationFrame(updateStars);
    }
    updateStars();
  </script>
</body>
</html>
