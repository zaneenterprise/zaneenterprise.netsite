<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message Sent – ZaneEnterprise LLC</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#000;--fg:#f5f5f7;--accent:#13b0f2;
      --x:50vw;--y:50vh;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      color:var(--fg);
      min-height:100vh;
      padding:2rem 1.5rem;
      background:
        radial-gradient(800px circle at var(--x) var(--y),
          rgba(19,176,242,0.3) 0%, rgba(0,0,0,0) 70%), var(--bg);
      overflow-x:hidden;
    }

    #stars{position:fixed;inset:0;z-index:-2;background:#000;}

    main{
      max-width:800px;width:100%;margin:0 auto;
      display:flex;flex-direction:column;align-items:center;
      min-height:100vh;justify-content:center;text-align:center;
    }

    .success-icon{
      width:120px;height:120px;margin-bottom:2rem;
      position:relative;animation:float-bounce 2s ease-out;
    }
    .success-circle{
      width:100%;height:100%;border-radius:50%;
      background:linear-gradient(45deg,#13b0f2,#0099ff);
      position:relative;box-shadow:0 0 60px rgba(19,176,242,0.5);
      animation:pulse-glow 2s ease-in-out infinite;
    }
    .success-checkmark{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:50px;height:26px;
      border:4px solid white;border-top:none;border-right:none;
      transform:translate(-50%,-65%) rotate(-45deg);
      animation:draw-check 0.8s ease-out 0.5s both;
    }

    @keyframes float-bounce{
      0%{opacity:0;transform:translateY(100px) scale(0.3)}
      50%{transform:translateY(-20px) scale(1.1)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes pulse-glow{
      0%,100%{box-shadow:0 0 60px rgba(19,176,242,0.5)}
      50%{box-shadow:0 0 100px rgba(19,176,242,0.8)}
    }
    @keyframes draw-check{
      0%{width:0;height:0}
      50%{width:25px;height:0}
      100%{width:50px;height:26px}
    }

    h1{
      font-size:clamp(2.5rem,5vw,3.5rem);font-weight:600;
      margin-bottom:1rem;animation:slide-up 1s ease-out 0.3s both;
      background:linear-gradient(45deg,#13b0f2,#00d4ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .subtitle{
      font-size:1.2rem;opacity:0.9;margin-bottom:3rem;
      animation:slide-up 1s ease-out 0.6s both;
    }

    @keyframes slide-up{
      from{opacity:0;transform:translateY(30px)}
      to{opacity:1;transform:translateY(0)}
    }

    .stats-grid{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:2rem;margin-bottom:3rem;width:100%;max-width:600px;
    }
    .stat-card{
      background:#111;border-radius:16px;padding:2rem 1.5rem;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      border:1px solid #222;position:relative;overflow:hidden;
      animation:card-reveal 0.8s ease-out both;
      transform:translateY(50px);opacity:0;
    }
    .stat-card:nth-child(1){animation-delay:0.9s}
    .stat-card:nth-child(2){animation-delay:1.1s}
    .stat-card:nth-child(3){animation-delay:1.3s}
    .stat-card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(45deg,transparent,rgba(19,176,242,0.1),transparent);
      transform:translateX(-100%);animation:shimmer 2s ease-in-out infinite;
    }
    .stat-number{
      font-size:2.2rem;font-weight:600;color:var(--accent);
      margin-bottom:0.5rem;display:block;
    }
    .stat-label{font-size:0.9rem;opacity:0.8}

    @keyframes card-reveal{
      to{transform:translateY(0);opacity:1}
    }
    @keyframes shimmer{
      0%{transform:translateX(-100%)}
      100%{transform:translateX(100%)}
    }

    .floating-particles{
      position:absolute;width:100%;height:100%;
      pointer-events:none;overflow:hidden;
    }
    .particle{
      position:absolute;width:4px;height:4px;
      background:var(--accent);border-radius:50%;
      animation:float-particle 6s ease-in-out infinite;
      opacity:0.6;
    }

    @keyframes float-particle{
      0%,100%{transform:translateY(0) rotate(0deg);opacity:0.6}
      50%{transform:translateY(-100px) rotate(180deg);opacity:1}
    }

    .action-buttons{
      display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;
      animation:slide-up 1s ease-out 1.5s both;
    }
    .btn{
      padding:1rem 2rem;border-radius:50px;text-decoration:none;
      font-weight:600;transition:all 0.3s ease;position:relative;
      overflow:hidden;border:2px solid transparent;
    }
    .btn-primary{
      background:linear-gradient(45deg,#13b0f2,#0099ff);
      color:white;
    }
    .btn-secondary{
      background:transparent;color:var(--accent);
      border-color:var(--accent);
    }
    .btn:hover{
      transform:translateY(-3px) scale(1.05);
      box-shadow:0 12px 40px rgba(19,176,242,0.4);
    }
    .btn-secondary:hover{
      background:var(--accent);color:var(--bg);
    }

    footer{
      position:absolute;bottom:1rem;left:0;right:0;
      text-align:center;font-size:0.85rem;opacity:0.65;
    }

    @media (max-width: 768px){
      .stats-grid{grid-template-columns:1fr;gap:1.5rem}
      .action-buttons{flex-direction:column;align-items:center}
      .btn{width:100%;max-width:280px;text-align:center}
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>
  
  <div class="floating-particles" id="particles"></div>

  <main>
    <div class="success-icon">
      <div class="success-circle"></div>
      <div class="success-checkmark"></div>
    </div>

    <h1>Message Sent Successfully!</h1>
    <p class="subtitle">Thanks for reaching out! I'll get back to you soon.</p>


    <div class="action-buttons">
      <a href="index.html" class="btn btn-primary">← Back to Home</a>
      <a href="contact.html" class="btn btn-secondary">Send Another Message</a>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('year').textContent = new Date().getFullYear();
    });
    
    const root = document.documentElement;
    window.addEventListener('pointermove', e => {
      root.style.setProperty('--x', e.clientX + 'px');
      root.style.setProperty('--y', e.clientY + 'px');
    });

    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const STAR_COUNT = 150;
    const stars = [];
    const shootingStars = [];
    
    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for(let i = 0; i < STAR_COUNT; i++){
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * 0.5 + 0.2,
        r: Math.random() * 1.2 + 0.4,
        opacity: Math.random() * 0.5 + 0.5
      });
    }

    function createShootingStar(){
      if(Math.random() < 0.03 && shootingStars.length < 4){
        shootingStars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height * 0.5,
          vx: (Math.random() - 0.5) * 12,
          vy: Math.random() * 6 + 2,
          length: Math.random() * 100 + 50,
          opacity: 1
        });
      }
    }

    function updateStars(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        s.opacity += (Math.random() - 0.5) * 0.05;
        s.opacity = Math.max(0.3, Math.min(1, s.opacity));
        s.y += s.z;
        if(s.y > canvas.height) s.y = -10;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      
      createShootingStar();
      shootingStars.forEach((s, i) => {
        if(s.opacity <= 0){
          shootingStars.splice(i, 1);
          return;
        }
        
        const gradient = ctx.createLinearGradient(s.x, s.y, s.x - s.vx * 12, s.y - s.vy * 12);
        gradient.addColorStop(0, `rgba(19,176,242,${s.opacity})`);
        gradient.addColorStop(1, 'rgba(19,176,242,0)');
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx * s.length/12, s.y - s.vy * s.length/12);
        ctx.stroke();
        
        s.x += s.vx;
        s.y += s.vy;
        s.opacity -= 0.015;
      });
      
      requestAnimationFrame(updateStars);
    }
    updateStars();

    function createFloatingParticles(){
      const container = document.getElementById('particles');
      for(let i = 0; i < 20; i++){
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
        container.appendChild(particle);
      }
    }
    createFloatingParticles();

    function animateNumbers(){
      const counters = document.querySelectorAll('.stat-number');
      counters.forEach(counter => {
        const target = parseInt(counter.getAttribute('data-target'));
        const duration = 2000;
        const increment = target / (duration / 16);
        let current = 0;
        
        const timer = setInterval(() => {
          current += increment;
          if(current >= target){
            counter.textContent = target + (target === 100 ? '%' : target === 24 ? 'h' : '+');
            clearInterval(timer);
          } else {
            counter.textContent = Math.floor(current) + (target === 100 ? '%' : target === 24 ? 'h' : '+');
          }
        }, 16);
      });
    }

    setTimeout(animateNumbers, 1200);

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => {
        btn.style.filter = 'brightness(1.1)';
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.filter = 'brightness(1)';
      });
    });
  </script>
  <footer>
    © <span id="year"></span> ZaneEnterprise LLC. All rights reserved.
  </footer>
  </body>
</html>
